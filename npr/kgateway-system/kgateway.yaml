---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  interval: 5m
  url: oci://cr.kgateway.dev/kgateway-dev/charts/kgateway
  ref:
    semver: v2.0.3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: kgateway
    namespace: kgateway-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace
