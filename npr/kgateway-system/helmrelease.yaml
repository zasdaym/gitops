apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kgateway
  namespace: kgateway-system
spec:
  interval: 5m
  chart:
    spec:
      chart: kgateway
      version: v2.0.3
      sourceRef:
        kind: OCIRepository
        name: kgateway
        namespace: kgateway-system
  install:
    crds: Create
  upgrade:
    crds: CreateReplace