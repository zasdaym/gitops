---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: caddy
spec:
  parentRefs:
    - name: http
      namespace: nginx-gateway
  hostnames:
    - file.zasda.id
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: caddy
          port: 80
